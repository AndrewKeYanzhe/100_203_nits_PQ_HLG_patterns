<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 203 nits HLG Pattern</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            font-family: sans-serif;
        }

        .video-container {
            display: flex;
            gap: 10px;
            padding: 10px;
        }

        .video-wrapper {
            flex: 1;
            text-align: center;
        }

        .video-label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        video {
            width: 100%;
            /* background: #000; */
        }
    </style>
</head>
<body>

    <div class="video-container">
        <div class="video-wrapper">
            <div class="video-label">HLG</div>
            <video loop muted>
                <source src="100 203 nits HLG.mp4" type="video/mp4">
            </video>
        </div>

        <div class="video-wrapper">
            <div class="video-label">PQ</div>
            <video loop muted>
                <source src="100 203 nits PQ.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- <script>
        // Toggle controls on hover to keep the UI clean
        document.querySelectorAll('video').forEach(video => {
            video.addEventListener('mouseenter', () => {
                video.controls = true;
            });
            video.addEventListener('mouseleave', () => {
                video.controls = false;
            });
        });
    </script> -->

</body>
</html>
